name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  MPLBACKEND: Agg          # headless Matplotlib; no VTK windowing in CI

jobs:
  tests:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (core + ui + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ui,dev]"

      - name: Run test suite
        run: pytest -q

      - name: Runtime-pipeline integration gate
        run: python -m tests.validation.validate_runtime_pipeline

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/cl3o/ui/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/cl3o/ui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build
